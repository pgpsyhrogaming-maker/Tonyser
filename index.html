<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thejas | Gamer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* Animated Neon Background */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, #ff00ff22, #000000);
  animation: moveBg 10s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  50% { transform: translate(-50px,-50px); }
  100% { transform: translate(0,0); }
}

/* TAP SCREEN */
#enterScreen {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:28px;
  z-index:999;
  cursor:pointer;
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% { text-shadow: 2px 2px #ff00ff; }
  50% { text-shadow: -2px -2px #00ffff; }
  100% { text-shadow: 2px 2px #ff00ff; }
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  border-bottom:1px solid #ff00ff;
}

nav h1 {
  color:#00ffff;
  text-shadow:0 0 10px #00ffff;
}

/* HERO */
.hero {
  text-align:center;
  padding:80px 20px;
}

.hero h1 {
  font-size:50px;
  color:#ff00ff;
  text-shadow:0 0 20px #ff00ff;
}

/* SECTION */
.section {
  padding:40px;
  max-width:1000px;
  margin:auto;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border:1px solid #ff00ff;
  border-radius:10px;
  margin:20px 0;
  box-shadow:0 0 20px #ff00ff44;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.02);
  box-shadow:0 0 30px #00ffff;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<!-- INTRO SCREEN -->
<div id="enterScreen" onclick="startSite()">
🎮 TAP TO ENTER<br>
<small>Enable Sound</small>
</div>

<!-- NAV -->
<nav>
  <h1>THEJAS</h1>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>THEJAS</h1>
  <p>Gamer & Omegle Content Creator</p>
</div>

<!-- ABOUT -->
<div class="section">
  <div class="card">
    <h2>About</h2>
    <p>Hello! I'm Thejas. Gamer and Omegle content creator.</p>
  </div>
</div>

<!-- GAMES -->
<div class="section">
  <div class="card">
    <h2>Games</h2>
    <p>PUBG | Free Fire | eFootball</p>
  </div>
</div>

<!-- CONTACT -->
<div class="section">
  <div class="card">
    <h2>Contact</h2>
    <p>Instagram: @ome.tonyserrrr</p>
    <p>WhatsApp: +91 7994873681</p>
  </div>
</div>

<footer>
  <p>© 2026 Thejas</p>
</footer>

<!-- SOUND EFFECT -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- YOUTUBE MUSIC -->
<iframe id="yt"
width="0" height="0"
src="">
</iframe>

<script>
function startSite() {
  // Play click sound
  document.getElementById("clickSound").play();

  // Start music
  document.getElementById("yt").src =
  "https://www.youtube.com/embed/u2ah9tWTkmk?autoplay=1&loop=1&playlist=u2ah9tWTkmk";

  // Hide intro
  document.getElementById("enterScreen").style.display = "none";
}
</script>

</body>
</html>
