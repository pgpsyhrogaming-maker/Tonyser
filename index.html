<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thejas | Retro Gamer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(to bottom, #2b1055, #7597de);
      color: #fff;
    }

    header {
      text-align: center;
      padding: 40px;
    }

    header h1 {
      color: #ffcc00;
      text-shadow: 0 0 10px #ffcc00;
    }

    .logo {
      width: 180px;
      display: block;
      margin: 0 auto 15px;
      border-radius: 20px;
      box-shadow: 0 0 25px #ffcc00;
    }

    nav {
      text-align: center;
      padding: 10px;
      background: rgba(0,0,0,0.6);
    }

    nav a {
      color: #ffcc00;
      margin: 0 15px;
      text-decoration: none;
    }

    section {
      max-width: 900px;
      margin: auto;
      padding: 30px;
    }

    .card {
      background: rgba(0,0,0,0.6);
      border: 1px solid #ffcc00;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
    }

    h2 {
      color: #ffcc00;
    }

    footer {
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

<header>
  <img src="logo.png" class="logo">
  <h1>THEJAS</h1>
  <p>Retro Gamer & Omegle Content Creator</p>
</header>

<nav>
  <a href="#about">About</a>
  <a href="#games">Games</a>
  <a href="#contact">Contact</a>
</nav>

<section id="about">
  <div class="card">
    <h2>About Me</h2>
    <p>Hello, I am Thejas. I am a gamer and Omegle content creator.</p>
  </div>
</section>

<section id="games">
  <div class="card">
    <h2>Games I Play</h2>
    <p>PUBG | Free Fire | eFootball</p>
  </div>
</section>

<section id="contact">
  <div class="card">
    <h2>Contact</h2>
    <p>Instagram: @ome.tonyserrrr</p>
    <p>WhatsApp: +91 7994873681</p>
  </div>
</section>

<footer>
  <p>© 2026 Thejas</p>
</footer>

<!-- Background Music -->
<audio autoplay loop controls>
  <source src="music.mp3" type="audio/mpeg">
</audio>

</body>
</html>
