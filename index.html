<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thejas | Pro Gamer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  color:white;
  overflow-x:hidden;
}

/* VIDEO BACKGROUND */
video{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

/* ENTER SCREEN */
#enter{
  position:fixed;
  width:100%;height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:30px;
  z-index:999;
  cursor:pointer;
  animation:glitch 1s infinite;
}

@keyframes glitch{
  0%{text-shadow:2px 2px #ff00ff;}
  50%{text-shadow:-2px -2px #00ffff;}
  100%{text-shadow:2px 2px #ff00ff;}
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid #ff00ff;
}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
}

.hero img{
  width:130px;
  border-radius:20px;
  box-shadow:0 0 30px #00ffff;
}

.hero h1{
  font-size:60px;
  color:#ff00ff;
  text-shadow:0 0 25px #ff00ff;
}

/* CARD */
.section{
  padding:40px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  margin:20px 0;
  border:1px solid #ff00ff;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
  box-shadow:0 0 30px #00ffff;
}

/* GAME CARDS */
.games{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.game{
  width:150px;
  padding:10px;
  border:1px solid #00ffff;
  border-radius:10px;
  text-align:center;
  transition:0.3s;
}

.game:hover{
  background:#00ffff;
  color:black;
  transform:scale(1.1);
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-gaming-setup-5174/1080p.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- ENTER SCREEN -->
<div id="enter" onclick="startSite()">
🎮 ENTER GAME
</div>

<!-- NAV -->
<nav>
<h2>THEJAS</h2>
</nav>

<!-- HERO -->
<div class="hero">
<img src="logo.png">
<h1>THEJAS</h1>
<p>Pro Gamer & Omegle Creator</p>
</div>

<!-- ABOUT -->
<div class="section">
<div class="card">
<h2>About</h2>
<p>I am Thejas, passionate gamer and Omegle content creator.</p>
</div>
</div>

<!-- GAMES -->
<div class="section">
<div class="card">
<h2>Games</h2>
<div class="games">
<div class="game">PUBG</div>
<div class="game">Free Fire</div>
<div class="game">eFootball</div>
</div>
</div>
</div>

<!-- CONTACT -->
<div class="section">
<div class="card">
<h2>Contact</h2>
<p>Instagram: @ome.tonyserrrr</p>
<p>WhatsApp: +91 7994873681</p>
</div>
</div>

<footer>© 2026 Thejas</footer>

<!-- SOUND -->
<audio id="click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- YOUTUBE -->
<iframe id="yt" width="0" height="0" allow="autoplay"></iframe>

<script>
function startSite(){
  document.getElementById("click").play();

  document.getElementById("yt").src =
  "https://www.youtube.com/embed/u2ah9tWTkmk?autoplay=1&loop=1&playlist=u2ah9tWTkmk";

  document.getElementById("enter").style.display="none";
}
</script>

</body>
</html>
