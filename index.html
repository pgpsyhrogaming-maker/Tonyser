<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thejas | Gamer</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: #0a0a0f;
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #000;
  border-bottom: 1px solid #ff00ff;
}

nav h1 {
  color: #00ffff;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
  background: radial-gradient(circle, #1a0033, #000);
}

.hero h1 {
  font-size: 50px;
  color: #ff00ff;
  text-shadow: 0 0 20px #ff00ff;
}

.hero p {
  color: #00ffff;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 10px 25px;
  border: 1px solid #00ffff;
  color: #00ffff;
  background: transparent;
  cursor: pointer;
}

.btn:hover {
  background: #00ffff;
  color: black;
}

/* SECTIONS */
.section {
  padding: 40px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border: 1px solid #ff00ff;
  border-radius: 10px;
  margin: 20px 0;
  box-shadow: 0 0 20px #ff00ff33;
}

/* SKILLS BAR */
.skill {
  margin: 10px 0;
}

.bar {
  height: 8px;
  background: #222;
}

.fill {
  height: 8px;
  background: #00ffff;
}

/* GAMES */
.games img {
  width: 100px;
  margin: 10px;
  border-radius: 10px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <h1>THEJAS</h1>
  <div>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#games">Games</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>THEJAS</h1>
  <p>I'm a Gamer & Content Creator</p>
  <button class="btn" onclick="playMusic()">▶ Play Music</button>
</div>

<!-- ABOUT -->
<div class="section" id="about">
  <div class="card">
    <h2>About Me</h2>
    <p>Hello! I'm Thejas. I am a gamer and Omegle content creator.</p>
  </div>
</div>

<!-- SKILLS -->
<div class="section" id="skills">
  <div class="card">
    <h2>Skills</h2>

    <div class="skill">Gameplay
      <div class="bar"><div class="fill" style="width:90%"></div></div>
    </div>

    <div class="skill">Strategy
      <div class="bar"><div class="fill" style="width:85%"></div></div>
    </div>

    <div class="skill">Sniping
      <div class="bar"><div class="fill" style="width:92%"></div></div>
    </div>

  </div>
</div>

<!-- GAMES -->
<div class="section" id="games">
  <div class="card">
    <h2>Games</h2>
    <p>PUBG | Free Fire | eFootball</p>
  </div>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
  <div class="card">
    <h2>Contact</h2>
    <p>Instagram: @ome.tonyserrrr</p>
    <p>WhatsApp: +91 7994873681</p>
  </div>
</div>

<footer>
  <p>© 2026 Thejas</p>
</footer>

<!-- MUSIC -->
<iframe id="yt"
width="0" height="0"
src="https://www.youtube.com/embed/u2ah9tWTkmk?loop=1&playlist=u2ah9tWTkmk">
</iframe>

<script>
function playMusic() {
  document.getElementById("yt").src += "&autoplay=1";
}
</script>

</body>
</html>
