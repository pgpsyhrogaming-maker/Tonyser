<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TONYSER</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0b1d3a, #02040a);
    color: white;
    overflow: hidden;
}

/* ENTRY SCREEN */
#entry {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

#entry h1 {
    font-size: 35px;
    color: gold;
    text-align: center;
    animation: glow 2s infinite alternate;
}

#entry button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: gold;
    color: black;
    font-weight: bold;
    border-radius: 10px;
}

/* MAIN PAGE */
.main {
    display: none;
    text-align: center;
    padding-top: 80px;
}

.logo {
    font-size: 24px;
    color: gold;
    border: 1px solid gold;
    display: inline-block;
    padding: 8px 15px;
    border-radius: 10px;
    background: rgba(0,0,0,0.4);
}

.card {
    margin: 20px auto;
    width: 80%;
    max-width: 300px;
    padding: 15px;
    border: 1px solid gold;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
}

@keyframes glow {
    from { text-shadow: 0 0 5px gold; }
    to { text-shadow: 0 0 20px gold; }
}
</style>
</head>

<body>

<!-- ENTRY SCREEN -->
<div id="entry">
    <h1>🌙 WELCOME TO TONY WORLD 🌙</h1>
    <button onclick="enter()">ENTER</button>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="main">

    <div class="logo">TONYSER</div>

    <h1>Hi, I'm Thejas 👋</h1>
    <p>🥁 Job: Panjavadyam Artist</p>
    <p>🎮 Gamer | Creator | Kerala Vibes</p>

    <div class="card">
        <h3>🔥 About Me</h3>
        <p>I love traditional Kerala Panjavadyam and gaming world.</p>
    </div>

    <div class="card">
        <h3>🌙 Lifestyle</h3>
        <p>Music + Culture + Gaming = My Identity</p>
    </div>

</div>

<script>
function enter() {
    document.getElementById("entry").style.display = "none";
    document.getElementById("main").style.display = "block";
}
</script>

</body>
</html>
