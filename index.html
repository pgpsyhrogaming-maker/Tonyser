<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thejas | Tony World</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  color:white;
  overflow-x:hidden;
  background:black;
}

/* VIDEO BACKGROUND */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.4);
}

/* 3D CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-3;
}

/* INTRO SCREEN */
#enter{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:28px;
  z-index:999;
  cursor:pointer;
  text-align:center;
  animation:glitch 1s infinite;
}

@keyframes glitch{
  0%{text-shadow:2px 2px #ff00ff;}
  50%{text-shadow:-2px -2px #00ffff;}
  100%{text-shadow:2px 2px #ff00ff;}
}

/* NAV */
nav{
  padding:15px;
  border-bottom:1px solid #ff00ff;
}
nav h2{color:#00ffff}

/* HERO */
.hero{
  text-align:center;
  padding:90px 20px;
}

.hero img{
  width:120px;
  border-radius:20px;
  box-shadow:0 0 25px #00ffff;
  animation:float 3s infinite;
}

@keyframes float{
  50%{transform:translateY(-10px);}
}

.hero h1{
  font-size:55px;
  color:#ff00ff;
}

/* SECTION */
.section{
  padding:40px;
  max-width:1000px;
  margin:auto;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border:1px solid #ff00ff;
  border-radius:12px;
  margin:20px 0;
  transition:0.3s;
}
.card:hover{
  transform:scale(1.02);
  box-shadow:0 0 20px #00ffff;
}

/* GAME GRID */
.games{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.game{
  padding:10px;
  border:1px solid #00ffff;
  border-radius:8px;
}
.game:hover{
  background:#00ffff;
  color:black;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.stat{
  flex:1;
  padding:10px;
  border:1px solid #00ffff;
  text-align:center;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-gaming-setup-5174/1080p.mp4">
</video>

<!-- INTRO -->
<div id="enter" onclick="startSite()">
🎮 WELCOME TO TONY WORLD<br>
<small>Tap to Enter</small>
</div>

<!-- NAV -->
<nav><h2>THEJAS</h2></nav>

<!-- HERO -->
<div class="hero">
<img src="logo.png">
<h1>THEJAS</h1>
<p>Gamer & Content Creator</p>
</div>

<!-- ABOUT -->
<div class="section">
<div class="card">
<h2>About</h2>
<p>I am Thejas, gamer & Omegle content creator.</p>
</div>
</div>

<!-- STATS -->
<div class="section">
<div class="card">
<h2>Stats</h2>
<div class="stats">
<div class="stat">KD: 3.5</div>
<div class="stat">Wins: 120+</div>
<div class="stat">Rank: Ace</div>
</div>
</div>
</div>

<!-- GAMES -->
<div class="section">
<div class="card">
<h2>Games</h2>
<div class="games">
<div class="game">PUBG</div>
<div class="game">Free Fire</div>
<div class="game">eFootball</div>
</div>
</div>
</div>

<!-- CONTACT -->
<div class="section">
<div class="card">
<h2>Contact</h2>
<p>Instagram: @ome.tonyserrrr</p>
<p>WhatsApp: +91 7994873681</p>
</div>
</div>

<footer>© 2026 Thejas</footer>

<!-- SOUND -->
<audio id="click" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<!-- MUSIC -->
<iframe id="yt" width="0" height="0" allow="autoplay"></iframe>

<!-- THREE JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
function startSite(){
  document.getElementById("click").play();

  document.getElementById("yt").src =
  "https://www.youtube.com/embed/u2ah9tWTkmk?autoplay=1&loop=1&playlist=u2ah9tWTkmk";

  document.getElementById("enter").style.display="none";
}

/* 3D PARTICLES */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const geometry = new THREE.BufferGeometry();
const count = 400;
const positions = new Float32Array(count*3);

for(let i=0;i<count*3;i++){
  positions[i]=(Math.random()-0.5)*8;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

const material = new THREE.PointsMaterial({
  size:0.02,
  color:0x00ffff
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

camera.position.z=3;

function animate(){
  requestAnimationFrame(animate);
  particles.rotation.y += 0.0008;
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize",()=>{
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
